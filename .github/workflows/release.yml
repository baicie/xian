name: Deploy task-harbor

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-task-harbor-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/task-harbor

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=git-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: task-harbor-prod

    steps:
      - name: Deploy to Tencent Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PERF_VM_HOST }}
          username: ${{ secrets.PERF_VM_USER }}
          key: ${{ secrets.PERF_VM_KEY }}
          password: ${{ secrets.PERF_VM_PASSWORD }}
          port: ${{ secrets.PERF_VM_SSH_PORT || '22' }}
          timeout: 20m
          command_timeout: 20m
          script: |
            set -euo pipefail

            IMAGE='${{ env.IMAGE_NAME }}:latest'
            APP_DIR="$HOME/workspace/task-harbor"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            PORT_FILE="$APP_DIR/.app-port"
            if [ -s "$PORT_FILE" ]; then
              APP_PORT="$(cat "$PORT_FILE")"
            else
              APP_PORT=8080
              while docker ps --format '{{.Ports}}' | grep -Eq ":${APP_PORT}->"; do
                APP_PORT=$((APP_PORT + 1))
              done
              printf '%s\n' "$APP_PORT" > "$PORT_FILE"
            fi
            case "$APP_PORT" in
              ''|*[!0-9]*) echo "Invalid port in $PORT_FILE"; exit 1 ;;
            esac
            export APP_PORT

            ENCRYPTION_KEY_FILE="$APP_DIR/.app-encryption-key"
            if [ ! -s "$ENCRYPTION_KEY_FILE" ]; then
              openssl rand -hex 32 > "$ENCRYPTION_KEY_FILE"
              chmod 600 "$ENCRYPTION_KEY_FILE"
            fi
            export APP_ENCRYPTION_KEY="$(cat "$ENCRYPTION_KEY_FILE")"

            cat > docker-compose.yml <<'COMPOSE'
            services:
              app:
                image: ${{ env.IMAGE_NAME }}:latest
                restart: unless-stopped
                environment:
                  DATABASE_URL: postgres://xian:xian@postgres:5432/xian
                  APP_ORIGIN: http://${{ secrets.PERF_VM_HOST }}:${APP_PORT}
                  APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
                ports:
                  - "${APP_PORT}:8080"
                depends_on:
                  postgres:
                    condition: service_healthy
              postgres:
                image: postgres:17-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: xian
                  POSTGRES_USER: xian
                  POSTGRES_PASSWORD: xian
                volumes:
                  - xian-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U xian"]
                  interval: 3s
                  timeout: 3s
                  retries: 10
            volumes:
              xian-data:
            COMPOSE

            docker pull "$IMAGE"
            docker compose up -d --remove-orphans

            for i in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/api/v1/health/ready" >/dev/null 2>&1; then
                echo "task-harbor healthy on port ${APP_PORT} after ${i}s"
                docker image prune -f >/dev/null 2>&1 || true
                exit 0
              fi
              sleep 2
            done

            docker compose logs app --tail=100
            exit 1
