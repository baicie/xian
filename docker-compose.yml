services:
  app:
    build: .
    environment:
      DATABASE_URL: postgres://xian:xian@postgres:5432/xian
      APP_ORIGIN: http://localhost:8080
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-task-harbor-local-development-key}
      AUTH_REGISTRATION_MODE: ${AUTH_REGISTRATION_MODE:-open}
      AUTH_ALLOW_WORKSPACE_CREATE: ${AUTH_ALLOW_WORKSPACE_CREATE:-true}
      ASSET_STORAGE_ROOT: /app/data/assets
      ASSET_MAX_FILE_BYTES: ${ASSET_MAX_FILE_BYTES:-10485760}
      ASSET_WORKSPACE_QUOTA_BYTES: ${ASSET_WORKSPACE_QUOTA_BYTES:-268435456}
    ports: ['8080:8080']
    volumes: ['xian-assets:/app/data/assets']
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: xian
      POSTGRES_USER: xian
      POSTGRES_PASSWORD: xian
    ports: ['${POSTGRES_PORT:-5432}:5432']
    volumes: ['xian-data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U xian']
      interval: 3s
      timeout: 3s
      retries: 10
volumes:
  xian-data:
  xian-assets:
